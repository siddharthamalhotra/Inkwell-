function walkAgentToSpot(avatar, spot) {
  const scene = avatar.getScene();

  if (avatar._bobAnim) {
    avatar._bobAnim.stop();
    avatar._bobAnim = null;
  }
  avatar.position.y = 0;

  const startPos = avatar.position.clone();
  const targetPos = spot.standPos.clone();
  const targetRotY = spot.standRotY;

  const doorPos = new BABYLON.Vector3(0, 0, ROOM.depth / 2 + 0.5);

  const limbs = avatar._limbs;
  let walkPhase = 0;
  let walking = true;
  const swingObs = scene.onBeforeRenderObservable.add(() => {
    if (!walking) return;
    walkPhase += 0.18;
    const swing = Math.sin(walkPhase) * 0.6;
    if (limbs) {
      limbs.legL.rotation.x =  swing;
      limbs.legR.rotation.x = -swing;
      limbs.armL.rotation.x = -swing * 0.7;
      limbs.armR.rotation.x =  swing * 0.7;
    }
  });

  const SPEED = 2.0;
  const faceTowards = (from, to) => {
    const dx = to.x - from.x;
    const dz = to.z - from.z;
    return Math.atan2(dx, dz);
  };

  const dist1 = BABYLON.Vector3.Distance(startPos, doorPos);
  const dist2 = BABYLON.Vector3.Distance(doorPos, targetPos);
  const frames1 = Math.max(20, Math.round((dist1 / SPEED) * 30));
  const frames2 = Math.max(20, Math.round((dist2 / SPEED) * 30));

  avatar.rotation.y = faceTowards(startPos, doorPos);

  animatePosition(avatar, startPos, doorPos, frames1, () => {
    avatar.rotation.y = faceTowards(doorPos, targetPos);

    animatePosition(avatar, doorPos, targetPos, frames2, () => {
      avatar.rotation.y = targetRotY;

      walking = false;
      scene.onBeforeRenderObservable.remove(swingObs);
      if (limbs) {
        limbs.legL.rotation.x = 0;
        limbs.legR.rotation.x = 0;
        limbs.armL.rotation.x = 0;
        limbs.armR.rotation.x = 0;
      }
    });
  });
}

// Position animation helper — uses BABYLON.Animation under the hood with easing
function animatePosition(node, from, to, frames, onComplete) {
  const anim = new BABYLON.Animation("walkPos", "position", 30,
    BABYLON.Animation.ANIMATIONTYPE_VECTOR3,
    BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
  anim.setKeys([
    { frame: 0, value: from.clone() },
    { frame: frames, value: to.clone() },
  ]);
  // No easing — constant speed looks more like walking
  node.animations = node.animations || [];
  // Filter out any existing position animations to avoid stacking
  node.animations = node.animations.filter(a => a.targetProperty !== "position");
  node.animations.push(anim);
  node.getScene().beginAnimation(node, 0, frames, false, 1, onComplete);
}

// Rotation animation helper (around X axis) — used for limb bending into sit pose
function animateRotationX(node, fromR, toR, frames) {
  const anim = new BABYLON.Animation("rotX", "rotation.x", 30,
    BABYLON.Animation.ANIMATIONTYPE_FLOAT,
    BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
  anim.setKeys([
    { frame: 0, value: fromR },
    { frame: frames, value: toR },
  ]);
  const ease = new BABYLON.CubicEase();
  ease.setEasingMode(BABYLON.EasingFunction.EASINGMODE_EASEOUT);
  anim.setEasingFunction(ease);
  node.animations = node.animations || [];
  node.animations.push(anim);
  node.getScene().beginAnimation(node, 0, frames, false, 1);
}

// Y-only animation (for the "sitting down" hop)
function animateY(node, fromY, toY, frames) {
  const anim = new BABYLON.Animation("sitY", "position.y", 30,
    BABYLON.Animation.ANIMATIONTYPE_FLOAT,
    BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
  anim.setKeys([
    { frame: 0, value: fromY },
    { frame: frames, value: toY },
  ]);
  const ease = new BABYLON.CubicEase();
  ease.setEasingMode(BABYLON.EasingFunction.EASINGMODE_EASEOUT);
  anim.setEasingFunction(ease);
  node.animations = node.animations || [];
  node.animations.push(anim);
  node.getScene().beginAnimation(node, 0, frames, false, 1);
}

// PROJECTOR SCREEN PRESENTATION LOGIC
// ============================================================
function getAgentMeta(agentId) {
  if (!window._office) return { name: agentId, color: "#888" };
  const entry = window._office.agents.find(a => a.agent.id === agentId);
  if (!entry) return { name: agentId, color: "#888" };
  const c = entry.agent.color;
  return { name: entry.agent.name, color: `rgb(${Math.round(c.r * 255)}, ${Math.round(c.g * 255)}, ${Math.round(c.b * 255)})` };
}

function showTranscriptPanel() {}
function hideTranscriptPanel() {}

function addPresentationCard(agentId, fullText) {
  const ps = window._presScreen;
  if (!ps) return Promise.resolve();
  const meta = getAgentMeta(agentId);

  if (ps.placeholder) {
    ps.container.removeControl(ps.placeholder);
    ps.placeholder = null;
  }
  ps.container.clearControls();

  const title = new BABYLON.GUI.TextBlock();
  title.text = meta.name;
  title.color = meta.color;
  title.fontSize = 40;
  title.fontFamily = "system-ui, sans-serif";
  title.fontWeight = "bold";
  title.height = "50px";
  title.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
  title.paddingLeft = "20px";
  title.paddingTop = "10px";
  ps.container.addControl(title);

  const body = new BABYLON.GUI.TextBlock();
  body.text = "";
  body.color = "#222222";
  body.fontSize = 26;
  body.fontFamily = "system-ui, sans-serif";
  body.textWrapping = true;
  body.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
  body.textVerticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
  body.height = "400px";
  body.paddingLeft = "20px";
  body.paddingRight = "20px";
  body.paddingTop = "10px";
  ps.container.addControl(body);

  const baseDelay = fullText.length > 400 ? 8 : 18;

  return new Promise((resolve) => {
    let i = 0;
    function typeNext() {
      if (i >= fullText.length) { resolve(); return; }
      body.text = fullText.slice(0, i + 1);
      i++;
      const ch = fullText[i - 1];
      const delay = (ch === "." || ch === "!" || ch === "?") ? baseDelay * 6 :
                    (ch === "," || ch === ";")               ? baseDelay * 3 : baseDelay;
      setTimeout(typeNext, delay);
    }
    typeNext();
  });
}
