name: Update Wiki on Merge

on:
  push:
    branches: [main]

jobs:
  regenerate-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Inkwell
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pymongo python-dotenv boto3

      - name: Verify secrets are set
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          python -c "
          import os
          for k in ['MONGODB_URI', 'ANTHROPIC_API_KEY', 'AWS_ACCESS_KEY_ID']:
              v = os.environ.get(k, '')
              print(f'{k}: {\"SET (\" + str(len(v)) + \" chars)\" if v else \"EMPTY\"}')"

      - name: Generate wiki and update MongoDB
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: inkwell
          MONGODB_COLLECTION: docs
          TARGET_REPO: https://github.com/${{ github.repository }}.git
        run: python agent.py

      - name: Commit updated wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output_wiki.md
          git diff --cached --quiet || git commit -m "docs: regenerate wiki after merge [skip ci]"
          git push
