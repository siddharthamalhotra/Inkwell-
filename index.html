<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inkwell — Living Documentation</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0f;
  --surface: #111118;
  --card:    #16161f;
  --border:  rgba(255,255,255,0.08);
  --text:    #e8e8e8;
  --muted:   #555;
  --carto:   #4a9eff;
  --hist:    #f0a500;
  --trans:   #50c878;
  --synth:   #b060ff;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 56px 24px 96px;
}

/* ── Header ───────────────────────────────────────── */
header {
  text-align: center;
  margin-bottom: 52px;
}
.logo {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.03em;
}
.logo-accent { color: var(--synth); }
.tagline {
  margin-top: 8px;
  font-size: 14px;
  color: var(--muted);
  letter-spacing: 0.01em;
}

/* ── Input ────────────────────────────────────────── */
#input-section {
  width: 100%;
  max-width: 660px;
  margin-bottom: 44px;
}
#form { display: flex; gap: 10px; }
#url-input {
  flex: 1;
  padding: 13px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
#url-input:focus { border-color: rgba(255,255,255,0.22); }
#url-input::placeholder { color: var(--muted); }
#url-input:disabled { opacity: 0.5; }
#submit-btn {
  padding: 13px 26px;
  background: var(--synth);
  border: none;
  border-radius: 8px;
  color: #0a0a0f;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s;
}
#submit-btn:hover:not(:disabled) { opacity: 0.85; }
#submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Pipeline ─────────────────────────────────────── */
#pipeline-section {
  width: 100%;
  max-width: 860px;
  margin-bottom: 32px;
}

#agents-row {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}

.agent-card {
  flex: 1;
  padding: 16px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
  opacity: 0.45;
}
.agent-card.running { opacity: 1; }
.agent-card.done    { opacity: 0.7; }

/* Per-agent accent glow when running */
#card-cartographer.running { border-color: var(--carto); box-shadow: 0 0 20px rgba(74,158,255,0.18); }
#card-historian.running    { border-color: var(--hist);  box-shadow: 0 0 20px rgba(240,165,0,0.18); }
#card-translator.running   { border-color: var(--trans); box-shadow: 0 0 20px rgba(80,200,120,0.18); }
#card-synthesis.running    { border-color: var(--synth); box-shadow: 0 0 20px rgba(176,96,255,0.18); }

#card-cartographer.done { border-color: rgba(74,158,255,0.25); }
#card-historian.done    { border-color: rgba(240,165,0,0.25); }
#card-translator.done   { border-color: rgba(80,200,120,0.25); }
#card-synthesis.done    { border-color: rgba(176,96,255,0.25); }

.card-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #2a2a38;
  margin-bottom: 12px;
  transition: background 0.3s;
}
#card-cartographer.running .card-dot { background: var(--carto); animation: blink 1.1s ease-in-out infinite; }
#card-historian.running    .card-dot { background: var(--hist);  animation: blink 1.1s ease-in-out infinite; }
#card-translator.running   .card-dot { background: var(--trans); animation: blink 1.1s ease-in-out infinite; }
#card-synthesis.running    .card-dot { background: var(--synth); animation: blink 1.1s ease-in-out infinite; }
.agent-card.done .card-dot { background: #50c878; animation: none; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

.card-name {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
}
.card-role {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}
.card-status {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  transition: color 0.3s;
}
#card-cartographer.running .card-status { color: var(--carto); }
#card-historian.running    .card-status { color: var(--hist);  }
#card-translator.running   .card-status { color: var(--trans); }
#card-synthesis.running    .card-status { color: var(--synth); }
.agent-card.done .card-status { color: #50c878; }

/* ── Activity log ─────────────────────────────────── */
#log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  height: 190px;
  overflow-y: auto;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 12px;
  line-height: 1.65;
  scroll-behavior: smooth;
}
.ll { padding: 1px 0; }
.ll.system       { color: #666; }
.ll.cartographer { color: var(--carto); }
.ll.historian    { color: var(--hist);  }
.ll.translator   { color: var(--trans); }
.ll.synthesis    { color: var(--synth); }

/* ── Wiki output ──────────────────────────────────── */
#output-section {
  width: 100%;
  max-width: 860px;
}

.wiki-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 44px 52px;
  margin-bottom: 28px;
}

/* Prose styles for rendered markdown */
.wiki-box h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
.wiki-box h2 { font-size: 18px; font-weight: 600; margin: 32px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.wiki-box h3 { font-size: 15px; font-weight: 600; margin: 22px 0 8px; }
.wiki-box p  { font-size: 14px; line-height: 1.75; margin-bottom: 14px; color: #c8c8c8; }
.wiki-box ul, .wiki-box ol { padding-left: 24px; margin-bottom: 14px; }
.wiki-box li { font-size: 14px; line-height: 1.7; color: #c8c8c8; margin-bottom: 5px; }
.wiki-box code {
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 12px;
  background: rgba(255,255,255,0.07);
  padding: 2px 6px;
  border-radius: 4px;
}
.wiki-box pre {
  background: #0d0d14;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 16px 18px;
  overflow-x: auto;
  margin-bottom: 18px;
}
.wiki-box pre code { background: none; padding: 0; font-size: 13px; }
.wiki-box table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 18px;
  font-size: 13px;
}
.wiki-box th, .wiki-box td {
  border: 1px solid var(--border);
  padding: 9px 13px;
  text-align: left;
}
.wiki-box th { background: var(--card); font-weight: 600; }
.wiki-box a  { color: var(--carto); text-decoration: none; }
.wiki-box a:hover { text-decoration: underline; }
.wiki-box blockquote {
  border-left: 3px solid var(--synth);
  padding-left: 16px;
  color: var(--muted);
  font-style: italic;
  margin: 14px 0;
}
.wiki-box hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* ── Search ───────────────────────────────────────── */
#search-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 26px 28px;
}
.search-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 14px;
}
.search-row { display: flex; gap: 10px; margin-bottom: 18px; }
#search-input {
  flex: 1;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: rgba(255,255,255,0.2); }
#search-input::placeholder { color: var(--muted); }
#search-btn {
  padding: 10px 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
#search-btn:hover { background: rgba(255,255,255,0.11); }

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.result-section { font-size: 11px; font-weight: 600; color: var(--synth); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.result-text { font-size: 13px; color: #aaa; line-height: 1.65; }

/* ── Utility ──────────────────────────────────────── */
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">✒ Ink<span class="logo-accent">well</span></div>
  <div class="tagline">Multi-agent living documentation for any codebase</div>
</header>

<section id="input-section">
  <form id="form">
    <input id="url-input" type="text" placeholder="https://github.com/owner/repo" required spellcheck="false" autocomplete="off" />
    <button type="submit" id="submit-btn">Generate Wiki →</button>
  </form>
</section>

<section id="pipeline-section" class="hidden">
  <div id="agents-row">
    <div class="agent-card" id="card-cartographer">
      <div class="card-dot"></div>
      <div class="card-name">Cartographer</div>
      <div class="card-role">maps architecture</div>
      <div class="card-status" id="st-cartographer">waiting</div>
    </div>
    <div class="agent-card" id="card-historian">
      <div class="card-dot"></div>
      <div class="card-name">Historian</div>
      <div class="card-role">reads git history</div>
      <div class="card-status" id="st-historian">waiting</div>
    </div>
    <div class="agent-card" id="card-translator">
      <div class="card-dot"></div>
      <div class="card-name">Translator</div>
      <div class="card-role">writes for 3 audiences</div>
      <div class="card-status" id="st-translator">waiting</div>
    </div>
    <div class="agent-card" id="card-synthesis">
      <div class="card-dot"></div>
      <div class="card-name">Synthesis</div>
      <div class="card-role">polishes final wiki</div>
      <div class="card-status" id="st-synthesis">waiting</div>
    </div>
  </div>
  <div id="log"></div>
</section>

<section id="output-section" class="hidden">
  <div class="wiki-box" id="wiki-content"></div>
  <div id="search-section">
    <div class="search-label">Search the Wiki</div>
    <div class="search-row">
      <input id="search-input" placeholder="Where does auth happen? What does this module do?" />
      <button id="search-btn">Search</button>
    </div>
    <div id="search-results"></div>
  </div>
</section>

<script>
const $ = id => document.getElementById(id);

let currentRepoUrl = null;
let activeEventSource = null;

const AGENT_NAMES = {
  cartographer: "Cartographer",
  historian:    "Historian",
  translator:   "Translator",
  synthesis:    "Synthesis",
};

function setAgentState(agent, state) {
  // state: 'idle' | 'running' | 'done'
  const card = $(`card-${agent}`);
  const st   = $(`st-${agent}`);
  card.className = `agent-card ${state}`;
  st.textContent = state === 'running' ? 'working...' : state === 'done' ? 'done ✓' : 'waiting';
}

function addLog(text, cls = 'system') {
  const log = $('log');
  const el = document.createElement('div');
  el.className = `ll ${cls}`;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  // Prevent unbounded growth
  while (log.children.length > 300) log.removeChild(log.firstChild);
}

function formatTool(tool, input) {
  if (tool === 'read_file')  return `read_file("${input.path || ''}")`;
  if (tool === 'list_files') return `list_files("${input.subdir || ''}")`;
  if (tool === 'git_log')    return `git_log("${input.path || ''}"${input.limit ? `, n=${input.limit}` : ''})`;
  return `${tool}(${JSON.stringify(input).slice(0, 50)})`;
}

function handleEvent(data) {
  switch (data.type) {

    case 'stage':
      if (data.stage === 'cartographer_historian') {
        setAgentState('cartographer', 'running');
        setAgentState('historian',    'running');
        addLog('▶  Cartographer + Historian starting in parallel');
      } else if (data.stage === 'translator') {
        // Mark parallel agents done if not already
        if ($('card-cartographer').classList.contains('running')) setAgentState('cartographer', 'done');
        if ($('card-historian').classList.contains('running'))    setAgentState('historian', 'done');
        setAgentState('translator', 'running');
        addLog('▶  Translator writing docs for three audiences');
      } else if (data.stage === 'synthesis') {
        if ($('card-translator').classList.contains('running')) setAgentState('translator', 'done');
        setAgentState('synthesis', 'running');
        addLog('▶  Synthesis agent polishing final wiki (Sonnet)');
      }
      break;

    case 'tool': {
      const agent = data.agent || 'system';
      addLog(`   ${AGENT_NAMES[agent] || agent}: ${formatTool(data.tool, data.input || {})}`, agent);
      break;
    }

    case 'agent_done': {
      const agent = data.agent;
      if (agent === 'cartographer' || agent === 'historian') {
        setAgentState(agent, 'done');
        addLog(`   ${AGENT_NAMES[agent]} done`, agent);
      }
      break;
    }

    case 'wiki': {
      ['cartographer','historian','translator','synthesis'].forEach(a => {
        if (!$(`card-${a}`).classList.contains('done')) setAgentState(a, 'done');
      });
      addLog('✓  Wiki generated');
      $('submit-btn').disabled = false;
      $('url-input').disabled  = false;

      if (data.repo_url) currentRepoUrl = data.repo_url;
      $('wiki-content').innerHTML = marked.parse(data.content);
      $('output-section').classList.remove('hidden');
      setTimeout(() => $('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      break;
    }

    case 'error': {
      addLog(`✗  ${data.message}`);
      $('submit-btn').disabled = false;
      $('url-input').disabled  = false;
      break;
    }
  }
}

// ── Form submit ───────────────────────────────────────────────────────────────

$('form').addEventListener('submit', e => {
  e.preventDefault();
  const url = $('url-input').value.trim();
  if (!url) return;

  if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }

  currentRepoUrl = url;

  // Reset
  ['cartographer','historian','translator','synthesis'].forEach(a => setAgentState(a, 'idle'));
  $('log').innerHTML = '';
  $('output-section').classList.add('hidden');
  $('search-results').innerHTML = '';
  $('pipeline-section').classList.remove('hidden');
  $('submit-btn').disabled = true;
  $('url-input').disabled  = true;

  addLog(`Cloning ${url} …`);

  const es = new EventSource(`/generate?url=${encodeURIComponent(url)}`);
  activeEventSource = es;

  es.onmessage = ev => {
    try {
      const data = JSON.parse(ev.data);
      if (data.type === 'heartbeat') return;
      handleEvent(data);
      if (data.type === 'wiki' || data.type === 'error') {
        es.close();
        activeEventSource = null;
      }
    } catch (err) {
      console.error('SSE parse error:', err);
    }
  };

  es.onerror = () => {
    es.close();
    activeEventSource = null;
    addLog('Connection lost');
    $('submit-btn').disabled = false;
    $('url-input').disabled  = false;
  };
});

// ── Search ────────────────────────────────────────────────────────────────────

async function doSearch() {
  const query = $('search-input').value.trim();
  if (!query || !currentRepoUrl) return;

  $('search-btn').disabled = true;
  $('search-results').innerHTML = '';

  try {
    const res = await fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, repo_url: currentRepoUrl }),
    });
    const data = await res.json();

    if (data.error) {
      $('search-results').innerHTML = `<div style="color:#ff6b6b;font-size:13px">${data.error}</div>`;
      return;
    }

    if (!data.results?.length) {
      $('search-results').innerHTML = `<div style="color:var(--muted);font-size:13px">No results found.</div>`;
      return;
    }

    data.results.forEach(r => {
      const card = document.createElement('div');
      card.className = 'result-card';
      const preview = (r.text || '').slice(0, 320);
      card.innerHTML = `
        <div class="result-section">${r.section || '—'}</div>
        <div class="result-text">${preview}${r.text?.length > 320 ? '…' : ''}</div>
      `;
      $('search-results').appendChild(card);
    });
  } finally {
    $('search-btn').disabled = false;
  }
}

$('search-btn').addEventListener('click', doSearch);
$('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>

</body>
</html>
