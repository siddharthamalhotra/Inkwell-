<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inkwell — Living Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #08080e;
  --surface: #0f0f17;
  --card:    #13131c;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #ececec;
  --muted:   #44445a;
  --muted2:  #6b6b82;
  --carto:   #4a9eff;
  --hist:    #f0a500;
  --trans:   #50c878;
  --synth:   #b060ff;
  --danger:  #ff6b6b;
}

html { scroll-behavior: smooth; }

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* Dot-grid background */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 24px 120px;
  background-image: radial-gradient(circle, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 28px 28px;
  position: relative;
}

/* Top purple glow */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 900px;
  height: 420px;
  background: radial-gradient(ellipse at 50% 0%, rgba(176,96,255,0.1) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

body > * { position: relative; z-index: 1; }

/* ── Header ───────────────────────────────────────────── */
header {
  text-align: center;
  margin-bottom: 64px;
}

.logo {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -0.04em;
  display: inline-flex;
  align-items: center;
  gap: 2px;
}

.logo-pen { margin-right: 6px; opacity: 0.85; }

.logo-accent {
  background: linear-gradient(130deg, #b060ff 0%, #7c6aff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  margin-top: 10px;
  font-size: 13px;
  color: var(--muted2);
  letter-spacing: 0.015em;
}

/* ── Input ────────────────────────────────────────────── */
#input-section {
  width: 100%;
  max-width: 680px;
  margin-bottom: 52px;
}

#private-row {
  margin-top: 10px;
  display: flex;
  justify-content: flex-end;
}

#private-toggle {
  background: none;
  border: none;
  color: var(--muted2);
  font-size: 11.5px;
  font-family: inherit;
  cursor: pointer;
  padding: 2px 0;
  transition: color 0.2s;
}
#private-toggle:hover { color: var(--text); }

#token-wrap {
  margin-top: 8px;
}

#token-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
#token-input:focus { border-color: rgba(176,96,255,0.38); }
#token-input::placeholder { color: var(--muted); }

#form {
  display: flex;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 5px;
  gap: 0;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#form:focus-within {
  border-color: rgba(176,96,255,0.45);
  box-shadow: 0 0 0 3px rgba(176,96,255,0.08), 0 8px 32px rgba(0,0,0,0.3);
}

#url-input {
  flex: 1;
  padding: 11px 16px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
}

#url-input::placeholder { color: var(--muted); }
#url-input:disabled { opacity: 0.4; }

#submit-btn {
  padding: 10px 24px;
  background: linear-gradient(135deg, #b060ff 0%, #7059f0 100%);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: -0.01em;
  transition: opacity 0.2s, transform 0.1s;
}

#submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
#submit-btn:active:not(:disabled) { transform: translateY(0); }
#submit-btn:disabled { opacity: 0.28; cursor: not-allowed; transform: none; }

/* ── Pipeline ─────────────────────────────────────────── */
#pipeline-section {
  width: 100%;
  max-width: 900px;
  margin-bottom: 40px;
}

#agents-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.agent-card {
  flex: 1;
  padding: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  opacity: 0.38;
  transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s, transform 0.3s;
}

.agent-card.running { opacity: 1; transform: translateY(-2px); }
.agent-card.done    { opacity: 0.6; transform: translateY(0); }

#card-cartographer.running { border-color: rgba(74,158,255,0.55);  box-shadow: 0 0 28px rgba(74,158,255,0.13),  0 6px 24px rgba(0,0,0,0.35); }
#card-historian.running    { border-color: rgba(240,165,0,0.55);   box-shadow: 0 0 28px rgba(240,165,0,0.13),   0 6px 24px rgba(0,0,0,0.35); }
#card-synthesis.running    { border-color: rgba(176,96,255,0.55);  box-shadow: 0 0 28px rgba(176,96,255,0.13),  0 6px 24px rgba(0,0,0,0.35); }

#card-cartographer.done { border-color: rgba(74,158,255,0.2); }
#card-historian.done    { border-color: rgba(240,165,0,0.2); }
#card-synthesis.done    { border-color: rgba(176,96,255,0.2); }

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.card-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}

#card-cartographer .card-icon { color: var(--carto); }
#card-historian    .card-icon { color: var(--hist);  }
#card-synthesis    .card-icon { color: var(--synth); }

#card-cartographer.running .card-icon { background: rgba(74,158,255,0.1);  border-color: rgba(74,158,255,0.3); }
#card-historian.running    .card-icon { background: rgba(240,165,0,0.1);   border-color: rgba(240,165,0,0.3); }
#card-synthesis.running    .card-icon { background: rgba(176,96,255,0.1);  border-color: rgba(176,96,255,0.3); }

.card-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
  transition: background 0.3s;
}

#card-cartographer.running .card-dot { background: var(--carto); animation: agent-pulse 1.4s ease-in-out infinite; }
#card-historian.running    .card-dot { background: var(--hist);  animation: agent-pulse 1.4s ease-in-out infinite; }
#card-synthesis.running    .card-dot { background: var(--synth); animation: agent-pulse 1.4s ease-in-out infinite; }
.agent-card.done .card-dot { background: var(--trans); animation: none; }

@keyframes agent-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.25; transform: scale(0.75); }
}

.card-name {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 2px;
  letter-spacing: -0.01em;
}

.card-role {
  font-size: 11px;
  color: var(--muted2);
  margin-bottom: 10px;
}

.card-status {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  transition: color 0.3s;
}

#card-cartographer.running .card-status { color: var(--carto); font-style: normal; }
#card-historian.running    .card-status { color: var(--hist);  font-style: normal; }
#card-synthesis.running    .card-status { color: var(--synth); font-style: normal; }
.agent-card.done .card-status { color: var(--trans); font-style: normal; }

/* ── Activity log ─────────────────────────────────────── */
.log-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.log-titlebar {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 8px 13px;
  background: rgba(255,255,255,0.025);
  border-bottom: 1px solid var(--border);
}

.log-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}
.log-dot:nth-child(1) { background: #ff5f57; }
.log-dot:nth-child(2) { background: #febc2e; }
.log-dot:nth-child(3) { background: #28c840; }

.log-titlebar-label {
  margin-left: 8px;
  font-size: 11px;
  color: var(--muted2);
  font-family: 'JetBrains Mono', monospace;
}

#log {
  padding: 12px 16px;
  height: 168px;
  overflow-y: auto;
  font-family: 'JetBrains Mono', "SF Mono", monospace;
  font-size: 11.5px;
  line-height: 1.75;
  scroll-behavior: smooth;
}

#log::-webkit-scrollbar { width: 3px; }
#log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.ll { color: var(--muted2); }
.ll.cartographer { color: var(--carto); }
.ll.historian    { color: var(--hist);  }
.ll.synthesis    { color: var(--synth); }

/* ── Wiki output ──────────────────────────────────────── */
#output-section {
  width: 100%;
  max-width: 900px;
}

#wiki-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.wiki-toolbar-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--muted2);
}

#download-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted2);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: -0.01em;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}

#download-btn:hover {
  background: rgba(255,255,255,0.09);
  color: var(--text);
  border-color: var(--border2);
}

.wiki-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 48px 56px;
  margin-bottom: 24px;
}

.wiki-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; line-height: 1.2; letter-spacing: -0.02em; }
.wiki-box h2 { font-size: 16px; font-weight: 600; margin: 36px 0 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); letter-spacing: -0.01em; }
.wiki-box h3 { font-size: 14px; font-weight: 600; margin: 22px 0 8px; }
.wiki-box p  { font-size: 14px; line-height: 1.8; margin-bottom: 14px; color: #b4b4c8; }
.wiki-box ul, .wiki-box ol { padding-left: 22px; margin-bottom: 14px; }
.wiki-box li { font-size: 14px; line-height: 1.75; color: #b4b4c8; margin-bottom: 4px; }
.wiki-box code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: rgba(255,255,255,0.06);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.wiki-box pre {
  background: #09090f;
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 18px 20px;
  overflow-x: auto;
  margin-bottom: 18px;
}
.wiki-box pre code { background: none; border: none; padding: 0; font-size: 12.5px; color: #c4c4dc; }
.wiki-box table { width: 100%; border-collapse: collapse; margin-bottom: 18px; font-size: 13px; }
.wiki-box th, .wiki-box td { border: 1px solid var(--border); padding: 9px 14px; text-align: left; }
.wiki-box th { background: var(--card); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted2); }
.wiki-box a  { color: var(--carto); text-decoration: none; }
.wiki-box a:hover { text-decoration: underline; }
.wiki-box blockquote {
  border-left: 2px solid var(--synth);
  padding-left: 18px;
  color: var(--muted2);
  font-style: italic;
  margin: 18px 0;
}
.wiki-box hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

/* ── Chat ─────────────────────────────────────────────── */
#chat-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}

.chat-header-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: rgba(176,96,255,0.14);
  border: 1px solid rgba(176,96,255,0.22);
  display: flex; align-items: center; justify-content: center;
  color: var(--synth);
  flex-shrink: 0;
}

.chat-header-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.chat-header-sub {
  font-size: 12px;
  color: var(--muted2);
  margin-left: auto;
}

#chat-messages {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 20px;
  min-height: 64px;
  max-height: 440px;
  overflow-y: auto;
}

#chat-messages:empty::before {
  content: 'Ask anything about the codebase — architecture, modules, where to find things…';
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
  align-self: center;
  margin: auto;
}

#chat-messages::-webkit-scrollbar { width: 3px; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 2px; }

.chat-bubble {
  border-radius: 10px;
  padding: 11px 15px;
  font-size: 13.5px;
  line-height: 1.7;
  max-width: 86%;
}

.chat-bubble.user {
  background: linear-gradient(135deg, rgba(176,96,255,0.2) 0%, rgba(112,89,240,0.14) 100%);
  border: 1px solid rgba(176,96,255,0.22);
  color: #ddd8ff;
  align-self: flex-end;
}

.chat-bubble.assistant {
  background: var(--surface);
  border: 1px solid var(--border);
  color: #bbbbd0;
  align-self: flex-start;
}

.chat-bubble.assistant p  { font-size: 13.5px; line-height: 1.7; margin-bottom: 8px; color: #bbbbd0; }
.chat-bubble.assistant p:last-child { margin-bottom: 0; }
.chat-bubble.assistant code { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; }
.chat-bubble.assistant ul, .chat-bubble.assistant ol { padding-left: 18px; margin: 6px 0; }
.chat-bubble.assistant li { font-size: 13.5px; line-height: 1.65; color: #bbbbd0; }
.chat-bubble.assistant strong { color: var(--text); font-weight: 600; }

.chat-sources {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.source-tag {
  font-size: 10px;
  padding: 2px 9px;
  background: rgba(176,96,255,0.1);
  border: 1px solid rgba(176,96,255,0.2);
  border-radius: 20px;
  color: rgba(185,130,255,0.9);
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* Thinking dots */
.thinking-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 3px 0;
}

.thinking-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted2);
  animation: think-bounce 1.3s ease-in-out infinite;
}

.thinking-dots span:nth-child(2) { animation-delay: 0.16s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.32s; }

@keyframes think-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Chat input bar */
.chat-input-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}

#chat-input {
  flex: 1;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13.5px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

#chat-input:focus { border-color: rgba(176,96,255,0.38); box-shadow: 0 0 0 2px rgba(176,96,255,0.07); }
#chat-input::placeholder { color: var(--muted); }

#chat-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #b060ff 0%, #7059f0 100%);
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}

#chat-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
#chat-btn:active:not(:disabled) { transform: translateY(0); }
#chat-btn:disabled { opacity: 0.28; cursor: not-allowed; }

/* ── Utility ──────────────────────────────────────────── */
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-pen">✒</span>Ink<span class="logo-accent">well</span></div>
  <div class="tagline">Multi-agent living documentation for any codebase</div>
</header>

<section id="input-section">
  <form id="form">
    <input id="url-input" type="text" placeholder="https://github.com/owner/repo" required spellcheck="false" autocomplete="off" />
    <button type="submit" id="submit-btn">Generate Wiki →</button>
  </form>
  <div id="private-row">
    <button type="button" id="private-toggle">🔒 Private repo?</button>
  </div>
  <div id="token-wrap" class="hidden">
    <input id="token-input" type="password" placeholder="GitHub personal access token (repo scope) — used only for this clone" autocomplete="off" />
  </div>
</section>

<section id="pipeline-section" class="hidden">
  <div id="agents-row">

    <div class="agent-card" id="card-cartographer">
      <div class="card-top">
        <div class="card-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
            <line x1="9" y1="3" x2="9" y2="18"></line>
            <line x1="15" y1="6" x2="15" y2="21"></line>
          </svg>
        </div>
        <div class="card-dot"></div>
      </div>
      <div class="card-name">Cartographer</div>
      <div class="card-role">maps architecture</div>
      <div class="card-status" id="st-cartographer">waiting</div>
    </div>

    <div class="agent-card" id="card-historian">
      <div class="card-top">
        <div class="card-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </div>
        <div class="card-dot"></div>
      </div>
      <div class="card-name">Historian</div>
      <div class="card-role">reads git history</div>
      <div class="card-status" id="st-historian">waiting</div>
    </div>

    <div class="agent-card" id="card-synthesis">
      <div class="card-top">
        <div class="card-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        </div>
        <div class="card-dot"></div>
      </div>
      <div class="card-name">Synthesis</div>
      <div class="card-role">writes docs + assembles wiki</div>
      <div class="card-status" id="st-synthesis">waiting</div>
    </div>

  </div>

  <div class="log-wrap">
    <div class="log-titlebar">
      <div class="log-dot"></div>
      <div class="log-dot"></div>
      <div class="log-dot"></div>
      <span class="log-titlebar-label">agent activity</span>
    </div>
    <div id="log"></div>
  </div>
</section>

<section id="output-section" class="hidden">
  <div id="wiki-toolbar">
    <span class="wiki-toolbar-label">Generated Wiki</span>
    <button id="download-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download .md
    </button>
  </div>

  <div class="wiki-box" id="wiki-content"></div>

  <div id="chat-section">
    <div class="chat-header">
      <div class="chat-header-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <span class="chat-header-title">Ask the codebase</span>
      <span class="chat-header-sub">grounded in the generated wiki</span>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-bar">
      <input id="chat-input" placeholder="How does auth work? Where is the database layer? What should I read first?" />
      <button id="chat-btn" title="Ask">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</section>

<script>
const $ = id => document.getElementById(id);

let currentRepoUrl      = null;
let currentWikiMarkdown = null;
let activeEventSource   = null;
let wikiBuffer          = '';
let wikiRenderTimer     = null;
let chatHistory         = [];  // [{role, content}] — sent with every chat request

const AGENT_NAMES = {
  cartographer: "Cartographer",
  historian:    "Historian",
  synthesis:    "Synthesis",
};

function setAgentState(agent, state) {
  const card = $(`card-${agent}`);
  const st   = $(`st-${agent}`);
  card.className = `agent-card ${state}`;
  st.textContent = state === 'running' ? 'working...' : state === 'done' ? 'done ✓' : 'waiting';
}

function addLog(text, cls = 'system') {
  const log = $('log');
  const el = document.createElement('div');
  el.className = `ll ${cls}`;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  while (log.children.length > 300) log.removeChild(log.firstChild);
}

function formatTool(tool, input) {
  if (tool === 'read_file')  return `read_file("${input.path || ''}")`;
  if (tool === 'list_files') return `list_files("${input.subdir || ''}")`;
  if (tool === 'git_log')    return `git_log("${input.path || ''}"${input.limit ? `, n=${input.limit}` : ''})`;
  return `${tool}(${JSON.stringify(input).slice(0, 50)})`;
}

function handleEvent(data) {
  switch (data.type) {

    case 'stage':
      if (data.stage === 'cartographer_historian') {
        setAgentState('cartographer', 'running');
        setAgentState('historian',    'running');
        addLog('▶  Cartographer + Historian starting in parallel');
      } else if (data.stage === 'synthesis') {
        setAgentState('synthesis', 'running');
        addLog('▶  Synthesis agent writing docs + wiki (Sonnet)');
      }
      break;

    case 'tool': {
      const agent = data.agent || 'system';
      addLog(`   ${AGENT_NAMES[agent] || agent}: ${formatTool(data.tool, data.input || {})}`, agent);
      break;
    }

    case 'agent_done': {
      const agent = data.agent;
      if (agent === 'cartographer' || agent === 'historian') {
        setAgentState(agent, 'done');
        addLog(`   ${AGENT_NAMES[agent]} done`, agent);
      }
      break;
    }

    case 'wiki_chunk': {
      wikiBuffer += data.chunk;
      if ($('output-section').classList.contains('hidden')) {
        $('wiki-content').innerHTML = '';
        $('output-section').classList.remove('hidden');
      }
      // Debounce re-renders to avoid thrashing on every character
      clearTimeout(wikiRenderTimer);
      wikiRenderTimer = setTimeout(() => {
        $('wiki-content').innerHTML = marked.parse(wikiBuffer);
      }, 80);
      break;
    }

    case 'wiki': {
      clearTimeout(wikiRenderTimer);
      wikiBuffer = '';
      ['cartographer','historian','synthesis'].forEach(a => {
        if (!$(`card-${a}`).classList.contains('done')) setAgentState(a, 'done');
      });
      addLog('✓  Wiki generated');
      $('submit-btn').disabled = false;
      $('url-input').disabled  = false;

      if (data.repo_url) currentRepoUrl = data.repo_url;
      currentWikiMarkdown = data.content;
      chatHistory = [];  // reset conversation when a new wiki is generated
      // Final clean render (replaces the progressive streaming render)
      $('wiki-content').innerHTML = marked.parse(data.content);
      $('chat-messages').innerHTML = '';
      $('output-section').classList.remove('hidden');
      setTimeout(() => $('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      break;
    }

    case 'error': {
      addLog(`✗  ${data.message}`);
      $('submit-btn').disabled = false;
      $('url-input').disabled  = false;
      break;
    }
  }
}

// ── Private repo toggle ───────────────────────────────────────────────────────

$('private-toggle').addEventListener('click', () => {
  const wrap = $('token-wrap');
  const hidden = wrap.classList.toggle('hidden');
  $('private-toggle').textContent = hidden ? '🔒 Private repo?' : '🔒 Hide token';
  if (!hidden) $('token-input').focus();
});

// ── Generate ──────────────────────────────────────────────────────────────────

$('form').addEventListener('submit', e => {
  e.preventDefault();
  const url = $('url-input').value.trim();
  if (!url) return;

  if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }

  currentRepoUrl = url;
  wikiBuffer = '';
  clearTimeout(wikiRenderTimer);

  ['cartographer','historian','synthesis'].forEach(a => setAgentState(a, 'idle'));
  $('log').innerHTML = '';
  $('output-section').classList.add('hidden');
  $('pipeline-section').classList.remove('hidden');
  $('submit-btn').disabled = true;
  $('url-input').disabled  = true;

  addLog(`Cloning ${url} …`);

  const token = $('token-input').value.trim();
  const params = new URLSearchParams({ url });
  if (token) params.set('token', token);

  const es = new EventSource(`/generate?${params}`);
  activeEventSource = es;

  es.onmessage = ev => {
    try {
      const data = JSON.parse(ev.data);
      if (data.type === 'heartbeat') return;
      handleEvent(data);
      if (data.type === 'wiki' || data.type === 'error') {
        es.close();
        activeEventSource = null;
      }
    } catch (err) {
      console.error('SSE parse error:', err);
    }
  };

  es.onerror = () => {
    es.close();
    activeEventSource = null;
    addLog('Connection lost');
    $('submit-btn').disabled = false;
    $('url-input').disabled  = false;
  };
});

// ── Download ──────────────────────────────────────────────────────────────────

$('download-btn').addEventListener('click', () => {
  if (!currentWikiMarkdown) return;
  const slug = (currentRepoUrl || 'wiki').split('/').pop() || 'wiki';
  const blob = new Blob([currentWikiMarkdown], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${slug}-wiki.md`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// ── Chat ──────────────────────────────────────────────────────────────────────

function appendBubble(role, html, sources) {
  const wrap = document.createElement('div');
  wrap.className = `chat-bubble ${role}`;
  wrap.innerHTML = html;
  if (sources?.length) {
    const row = document.createElement('div');
    row.className = 'chat-sources';
    sources.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'source-tag';
      tag.textContent = s;
      row.appendChild(tag);
    });
    wrap.appendChild(row);
  }
  $('chat-messages').appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return wrap;
}

async function doChat() {
  const question = $('chat-input').value.trim();
  if (!question || !currentRepoUrl) return;

  $('chat-btn').disabled = true;
  $('chat-input').value  = '';

  appendBubble('user', question);
  const thinking = appendBubble('assistant', '<div class="thinking-dots"><span></span><span></span><span></span></div>');

  // Keep last 20 turns (10 exchanges) to avoid token bloat
  const historyToSend = chatHistory.slice(-20);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, repo_url: currentRepoUrl, history: historyToSend }),
    });
    const data = await res.json();

    if (data.error) {
      thinking.innerHTML = `<span style="color:var(--danger)">${data.error}</span>`;
      return;
    }

    const answerText = data.answer || '';
    thinking.innerHTML = marked.parse(answerText);
    if (data.sources?.length) {
      const row = document.createElement('div');
      row.className = 'chat-sources';
      data.sources.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = s;
        row.appendChild(tag);
      });
      thinking.appendChild(row);
    }

    // Record this exchange in history for follow-up questions
    chatHistory.push({ role: 'user',      content: question   });
    chatHistory.push({ role: 'assistant', content: answerText });
  } catch (err) {
    thinking.innerHTML = `<span style="color:var(--danger)">Request failed</span>`;
  } finally {
    $('chat-btn').disabled = false;
    $('chat-input').focus();
  }
}

$('chat-btn').addEventListener('click', doChat);
$('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') doChat(); });
</script>

</body>
</html>
